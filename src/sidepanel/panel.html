<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <div class="header">
    <div class="header-actions">
      <button id="theme-toggle" class="icon-btn" title="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
      </button>
      <button id="reload" class="icon-btn" title="Reload data"><svg class="icon-reload" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg></button>
    </div>
  </div>

  <div class="main-layout">
  <!-- Main Content Area -->
  <div class="main-content">

  <!-- Inspector Tab -->
  <div class="tab-content active" id="tab-inspector">
    <div id="data"></div>
    <div id="status" class="status"></div>
  </div>

  <!-- Tools Tab -->
  <div class="tab-content" id="tab-tools">
    <div class="tool-selector">
      <select id="tool-select">
        <option value="base64">Base64 Encode / Decode</option>
        <option value="url">URL Encode / Decode</option>
        <option value="md5">MD5 Hash</option>
        <option value="sha256">SHA-256 Hash</option>
        <option value="json">JSON Beautify</option>
        <option value="vli">VLI Encode / Decode</option>
      </select>
    </div>

    <!-- Base64 Tool -->
    <div class="tool-panel active" id="tool-base64">
      <div class="tool-section">
        <div class="tool-label">Encode</div>
        <textarea class="tool-input" id="base64-encode-input" rows="3" placeholder="Enter text to encode..."></textarea>
        <textarea class="tool-result" id="base64-encode-result" rows="3" placeholder="Result..." readonly></textarea>
      </div>
      <div class="tool-divider"></div>
      <div class="tool-section">
        <div class="tool-label">Decode</div>
        <textarea class="tool-input" id="base64-decode-input" rows="3" placeholder="Enter base64 to decode..."></textarea>
        <textarea class="tool-result" id="base64-decode-result" rows="3" placeholder="Result..." readonly></textarea>
      </div>
    </div>

    <!-- URL Tool -->
    <div class="tool-panel" id="tool-url">
      <div class="tool-section">
        <div class="tool-label">Encode</div>
        <textarea class="tool-input" id="url-encode-input" rows="3" placeholder="Enter text to encode..."></textarea>
        <textarea class="tool-result" id="url-encode-result" rows="3" placeholder="Result..." readonly></textarea>
      </div>
      <div class="tool-divider"></div>
      <div class="tool-section">
        <div class="tool-label">Decode</div>
        <textarea class="tool-input" id="url-decode-input" rows="3" placeholder="Enter URL-encoded text..."></textarea>
        <textarea class="tool-result" id="url-decode-result" rows="3" placeholder="Result..." readonly></textarea>
      </div>
    </div>

    <!-- MD5 Tool -->
    <div class="tool-panel" id="tool-md5">
      <div class="tool-section">
        <div class="tool-label">MD5 Hash</div>
        <textarea class="tool-input" id="md5-input" rows="3" placeholder="Enter text to hash..."></textarea>
        <textarea class="tool-result" id="md5-result" rows="2" placeholder="Result..." readonly></textarea>
      </div>
    </div>

    <!-- SHA-256 Tool -->
    <div class="tool-panel" id="tool-sha256">
      <div class="tool-section">
        <div class="tool-label">SHA-256 Hash</div>
        <textarea class="tool-input" id="sha256-input" rows="3" placeholder="Enter text to hash..."></textarea>
        <textarea class="tool-result" id="sha256-result" rows="2" placeholder="Result..." readonly></textarea>
      </div>
    </div>

    <!-- JSON Beautify Tool -->
    <div class="tool-panel" id="tool-json">
      <div class="tool-section">
        <div class="tool-label">JSON / JS Beautify</div>
        <textarea class="tool-input" id="json-input" rows="6" placeholder="Paste JSON or JS here..."></textarea>
        <textarea class="tool-result" id="json-result" rows="10" placeholder="Formatted result..." readonly></textarea>
      </div>
    </div>

    <!-- VLI Tool -->
    <div class="tool-panel" id="tool-vli">
      <div class="tool-section">
        <div class="tool-label">Decode VLI Pixel</div>
        <textarea class="tool-input" id="vli-decode-input" rows="3" placeholder="Enter encoded VLI string..."></textarea>
        <textarea class="tool-result" id="vli-decode-result" rows="3" placeholder="Decoded result..." readonly></textarea>
      </div>
      <div class="tool-divider"></div>
      <div class="tool-section">
        <div class="tool-label">Encode VLI Pixel</div>
        <textarea class="tool-input" id="vli-encode-input" rows="3" placeholder="Enter text to encode..."></textarea>
        <textarea class="tool-result" id="vli-encode-result" rows="3" placeholder="Encoded result..." readonly></textarea>
      </div>
    </div>
  </div>

  </div><!-- end .main-content -->

  <!-- Tab Navigation (Right Sidebar) -->
  <div class="tab-nav">
    <button class="tab-btn active" data-tab="inspector" title="Inspector">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span class="tab-label">Inspector</span>
    </button>
    <button class="tab-btn" data-tab="tools" title="Tools">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
      <span class="tab-label">Tools</span>
    </button>
  </div>

  </div><!-- end .main-layout -->

  <script src="panel.js"></script>
</body>
</html>
