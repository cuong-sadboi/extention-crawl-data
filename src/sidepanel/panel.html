<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="panel.css" />
</head>

<body>
  <div class="main-layout">

    <!-- Main Content Area -->
    <div class="main-content">

      <!-- Inspector Tab -->
      <div class="tab-content active" id="tab-inspector">
        <!-- Sub-tabs navigation -->
        <div class="sub-tabs">
          <button class="sub-tab-btn active" data-subtab="data">Data</button>
          <button class="sub-tab-btn" data-subtab="links">Links</button>
        </div>

        <!-- Sub-tab contents -->
        <div class="sub-tab-content active" id="subtab-data">
          <div id="data"></div>
        </div>
        <div class="sub-tab-content" id="subtab-links">
          <div class="links-container" id="links-data">
            <div class="no-data">No links available</div>
          </div>
        </div>

        <div id="status" class="status"></div>
      </div>

      <!-- Base64 Tab -->
      <div class="tab-content" id="tab-base64">
        <div class="tool-section">
          <div class="tool-label">Base64 Encode</div>
          <textarea class="tool-input" id="base64-encode-input" rows="3"
            placeholder="Enter text to encode..."></textarea>
          <div class="result-wrapper">
            <textarea class="tool-result" id="base64-encode-result" rows="3" placeholder="Result..."
              readonly></textarea>
            <button class="result-copy-btn" data-target="base64-encode-result" title="Copy"><svg viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" />
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
              </svg></button>
          </div>
        </div>
        <div class="tool-divider"></div>
        <div class="tool-section">
          <div class="tool-label">Base64 Decode</div>
          <textarea class="tool-input" id="base64-decode-input" rows="3"
            placeholder="Enter base64 to decode..."></textarea>
          <div class="result-wrapper">
            <textarea class="tool-result" id="base64-decode-result" rows="3" placeholder="Result..."
              readonly></textarea>
            <button class="result-copy-btn" data-target="base64-decode-result" title="Copy"><svg viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" />
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
              </svg></button>
          </div>
        </div>
      </div>

      <!-- URL Tab -->
      <div class="tab-content" id="tab-url">
        <div class="tool-section">
          <div class="tool-label">URL Encode</div>
          <textarea class="tool-input" id="url-encode-input" rows="3" placeholder="Enter text to encode..."></textarea>
          <div class="result-wrapper">
            <textarea class="tool-result" id="url-encode-result" rows="3" placeholder="Result..." readonly></textarea>
            <button class="result-copy-btn" data-target="url-encode-result" title="Copy"><svg viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" />
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
              </svg></button>
          </div>
        </div>
        <div class="tool-divider"></div>
        <div class="tool-section">
          <div class="tool-label">URL Decode</div>
          <textarea class="tool-input" id="url-decode-input" rows="3"
            placeholder="Enter URL-encoded text..."></textarea>
          <div class="result-wrapper">
            <textarea class="tool-result" id="url-decode-result" rows="3" placeholder="Result..." readonly></textarea>
            <button class="result-copy-btn" data-target="url-decode-result" title="Copy"><svg viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" />
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
              </svg></button>
          </div>
        </div>
      </div>

      <!-- Hash Tab -->
      <div class="tab-content" id="tab-hash">
        <div class="tool-section">
          <div class="tool-label">Hash String</div>
          <textarea class="tool-input" id="hash-input" rows="3" placeholder="Enter text to hash..."></textarea>

          <div class="hash-results">
            <div class="hash-result-item">
              <span class="hash-label">MD5</span>
              <div class="hash-value-wrapper">
                <input type="text" class="hash-value" id="hash-md5" readonly placeholder="—">
                <button class="hash-copy-btn" data-target="hash-md5" title="Copy">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" />
                    <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
                  </svg>
                </button>
              </div>
            </div>

            <div class="hash-result-item">
              <span class="hash-label">SHA-1</span>
              <div class="hash-value-wrapper">
                <input type="text" class="hash-value" id="hash-sha1" readonly placeholder="—">
                <button class="hash-copy-btn" data-target="hash-sha1" title="Copy">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" />
                    <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
                  </svg>
                </button>
              </div>
            </div>

            <div class="hash-result-item">
              <span class="hash-label">SHA-256</span>
              <div class="hash-value-wrapper">
                <input type="text" class="hash-value" id="hash-sha256" readonly placeholder="—">
                <button class="hash-copy-btn" data-target="hash-sha256" title="Copy">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" />
                    <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
                  </svg>
                </button>
              </div>
            </div>

            <div class="hash-result-item">
              <span class="hash-label">SHA-384</span>
              <div class="hash-value-wrapper">
                <input type="text" class="hash-value" id="hash-sha384" readonly placeholder="—">
                <button class="hash-copy-btn" data-target="hash-sha384" title="Copy">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" />
                    <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
                  </svg>
                </button>
              </div>
            </div>

            <div class="hash-result-item">
              <span class="hash-label">SHA-512</span>
              <div class="hash-value-wrapper">
                <input type="text" class="hash-value" id="hash-sha512" readonly placeholder="—">
                <button class="hash-copy-btn" data-target="hash-sha512" title="Copy">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" />
                    <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Epoch Converter Tab -->
      <div class="tab-content" id="tab-epoch">
        <div class="tool-section">
          <div class="tool-label">Current Epoch</div>
          <div class="epoch-current-wrapper">
            <input type="text" class="epoch-current" id="epoch-current" readonly>
            <button class="epoch-copy-btn" data-target="epoch-current" title="Copy">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" />
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
              </svg>
            </button>
          </div>
        </div>

        <div class="tool-divider"></div>

        <div class="tool-section">
          <div class="tool-label">Epoch → Human Date</div>
          <input type="text" class="tool-input-single" id="epoch-to-date-input"
            placeholder="Enter epoch timestamp (e.g. 1709283600)">
          <div class="epoch-results" id="epoch-to-date-results">
            <div class="epoch-result-row">
              <span class="epoch-result-label">Local</span>
              <input type="text" class="epoch-result-value" id="epoch-local" readonly placeholder="—">
            </div>
            <div class="epoch-result-row">
              <span class="epoch-result-label">UTC</span>
              <input type="text" class="epoch-result-value" id="epoch-utc" readonly placeholder="—">
            </div>
            <div class="epoch-result-row">
              <span class="epoch-result-label">ISO 8601</span>
              <input type="text" class="epoch-result-value" id="epoch-iso" readonly placeholder="—">
            </div>
          </div>
        </div>

        <div class="tool-divider"></div>

        <div class="tool-section">
          <div class="tool-label">Human Date → Epoch</div>
          <div class="epoch-date-inputs">
            <div class="epoch-date-field">
              <label class="epoch-date-label">Yr</label>
              <input type="number" class="epoch-date-input year-input" id="epoch-yr" min="1970" max="2100"
                placeholder="2026">
            </div>
            <span class="epoch-date-sep">-</span>
            <div class="epoch-date-field">
              <label class="epoch-date-label">Mon</label>
              <input type="number" class="epoch-date-input month-input" id="epoch-mon" min="1" max="12" placeholder="3">
            </div>
            <span class="epoch-date-sep">-</span>
            <div class="epoch-date-field">
              <label class="epoch-date-label">Day</label>
              <input type="number" class="epoch-date-input day-input" id="epoch-day" min="1" max="31" placeholder="4">
            </div>
            <div class="epoch-date-field" style="margin-left: 8px;">
              <label class="epoch-date-label">Hr</label>
              <input type="number" class="epoch-date-input hour-input" id="epoch-hr" min="0" max="23" placeholder="4">
            </div>
            <span class="epoch-date-sep">:</span>
            <div class="epoch-date-field">
              <label class="epoch-date-label">Min</label>
              <input type="number" class="epoch-date-input minute-input" id="epoch-min" min="0" max="59"
                placeholder="36">
            </div>
            <span class="epoch-date-sep">:</span>
            <div class="epoch-date-field">
              <label class="epoch-date-label">Sec</label>
              <input type="number" class="epoch-date-input second-input" id="epoch-sec" min="0" max="59"
                placeholder="30">
            </div>
            <div class="epoch-date-field">
              <label class="epoch-date-label">TZ</label>
              <select class="epoch-tz-select" id="epoch-tz">
                <option value="GMT">GMT</option>
                <option value="UTC">UTC</option>
                <option value="Asia/Ho_Chi_Minh">GMT+7 (VN)</option>
                <option value="America/New_York">EST (NY)</option>
                <option value="America/Los_Angeles">PST (LA)</option>
                <option value="Europe/London">GMT (London)</option>
                <option value="Asia/Tokyo">JST (Tokyo)</option>
                <option value="Asia/Singapore">SGT (Singapore)</option>
              </select>
            </div>
            <button type="button" class="epoch-convert-btn" id="epoch-human-to-ts"
              title="Human date to Timestamp">Convert</button>
          </div>
          <div class="epoch-results">
            <div class="epoch-result-row">
              <span class="epoch-result-label">Seconds</span>
              <input type="text" class="epoch-result-value" id="date-epoch-seconds" readonly placeholder="—">
              <button class="epoch-copy-btn small" data-target="date-epoch-seconds" title="Copy">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                  stroke-linejoin="round">
                  <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" />
                  <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
                </svg>
              </button>
            </div>
            <div class="epoch-result-row">
              <span class="epoch-result-label">Milliseconds</span>
              <input type="text" class="epoch-result-value" id="date-epoch-ms" readonly placeholder="—">
              <button class="epoch-copy-btn small" data-target="date-epoch-ms" title="Copy">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                  stroke-linejoin="round">
                  <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" />
                  <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- JSON Beautify Tab -->
      <div class="tab-content" id="tab-json">
        <div class="tool-section">
          <div class="tool-label">JSON / JS Beautify</div>
          <textarea class="tool-input" id="json-input" rows="6" placeholder="Paste JSON or JS here..."></textarea>
          <div class="result-wrapper">
            <textarea class="tool-result" id="json-result" rows="10" placeholder="Formatted result..."
              readonly></textarea>
            <button class="result-copy-btn" data-target="json-result" title="Copy"><svg viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" />
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
              </svg></button>
          </div>
        </div>
      </div>

      <!-- VLI Tab -->
      <div class="tab-content" id="tab-vli">
        <div class="tool-section">
          <div class="tool-label">Decode VLI Pixel</div>
          <textarea class="tool-input" id="vli-decode-input" rows="3"
            placeholder="Enter encoded VLI string..."></textarea>
          <div class="result-wrapper">
            <textarea class="tool-result" id="vli-decode-result" rows="3" placeholder="Decoded result..."
              readonly></textarea>
            <button class="result-copy-btn" data-target="vli-decode-result" title="Copy"><svg viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" />
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
              </svg></button>
          </div>
        </div>
        <div class="tool-divider"></div>
        <div class="tool-section">
          <div class="tool-label">Encode VLI Pixel</div>
          <input type="text" class="tool-input" id="vli-encode-url" placeholder="Paste full URL here..." />
          <div id="vli-kv-container">
            <div class="vli-kv-row" data-order="last">
              <input type="text" class="vli-kv-key" placeholder="Key..." />
              <input type="text" class="vli-kv-value" placeholder="Value..." />
            </div>
          </div>
          <div class="result-wrapper">
            <textarea class="tool-result" id="vli-encode-result" rows="3" placeholder="Encoded result..."
              readonly></textarea>
            <button class="result-copy-btn" data-target="vli-encode-result" title="Copy"><svg viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" />
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
              </svg></button>
          </div>
        </div>
      </div>

    </div><!-- end .main-content -->

    <!-- Right Sidebar Navigation -->
    <div class="tab-nav">
      <!-- Main tabs -->
      <div class="tab-nav-main">
        <button class="tab-btn active" data-tab="inspector" title="Inspector">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
